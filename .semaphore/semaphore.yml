version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2404
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
global_job_config:
  prologue:
    commands:
      - sem-version python 3.12
      - checkout
      - mkdir -p .pip_cache
blocks:
  - name: Install dependencies
    dependencies: []
    task:
      jobs:
        - name: Dependencies
          commands:
            - cache restore
            - pip install pytest requests flask coverage locust
  - name: Tests
    dependencies:
      - Install dependencies
    task:
      jobs:
        - name: Tests
          commands:
            - cd 1-tdd && python -m pytest test_factorial.py -v
            - cd ..
            - cd 2-unit-testing && python -m pytest test_math_sum.py -v
  - name: Integration tests
    dependencies:
      - Tests
    task:
      jobs:
        - name: Integration tests
          commands:
            - cache restore
            - cd 3-integration-testing && python -m pytest test_integration.py -v
            - cd ..
            - cd 6-mocking && python -m pytest test_weather_service.py -v
            - cd ..
            - cd 10-database-testing && python -m pytest test_database.py -v
